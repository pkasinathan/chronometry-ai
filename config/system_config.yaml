# Chronometry Default Configuration
# ===================================
# This file contains ALL default settings. Do not edit this file directly.
# To customize, add your overrides to user_config.yaml — any key you set
# there will take precedence over the corresponding default here.

server:
  host: "127.0.0.1"
  port: 8051
  debug: false
  secret_key: "change-me-in-production"

paths:
  root_dir: "~/.chronometry/data"
  output_dir: "~/.chronometry/output"
  logs_dir: "~/.chronometry/logs"

capture:
  capture_interval_seconds: 900
  monitor_index: 1
  retention_days: 1095
  region: null
  startup_delay_seconds: 5
  screen_check_timeout: 2

annotation:
  backend: "local"
  annotation_mode: manual
  annotation_interval_hours: 4
  screenshot_analysis_batch_size: 1
  inference_image_max_edge: 1280
  inference_image_quality: 80
  timeout_sec: 30
  json_suffix: ".json"

  screenshot_analysis_prompt: |
    You are annotating MY OWN work activity from 1–6 screenshots captured within a short time window. Write what I'm actually doing and why — not what the UI looks like.

    {metadata_block}

    {recent_context}

    ✦ Using the inputs above
      - OS Context (if present) is ground truth from the operating system — active app, window title, URL, and workspace path are AUTHORITATIVE. Use them to anchor your annotation: confirm what's on screen, disambiguate unclear visuals, and fill gaps the screenshot alone can't answer.
      - Recent context (if present) shows my last few annotated activities. Use it to detect CONTINUITY vs. TASK SWITCH:
        • If the current screenshot matches the same app/repo/document, describe progress ("I am continuing to…", "I have moved on to the next step…").
        • If it's clearly a different task, note the switch ("I switched from X to Y").
        • Do NOT repeat recent context verbatim — add new information only.
      - If neither OS Context nor Recent context is provided, rely solely on the screenshot.

    ✦ Voice & POV
      - Write in first person ("I am …"), concise, professional.
      - Prefer action + purpose: what I'm doing → why → expected outcome/next step.

    ✦ Evidence to extract (from PR/IDE/terminal/docs/Slack/Jira/UIs + OS Context)
      - Repository, branch, PR/MR number & title, author, reviewers, status (open/draft/merged), target branch.
      - Ticket/issue IDs (JIRA/Linear), code module/file/function names, tests, datasets, workflow names.
      - Commands run, errors, CI status, environment (dev/test/prod), time ranges.
      - From IDE/Cursor right panel: current task, instruction, diff summary, test results.
      - From PR: what's being changed and for what purpose (summarize in 1 short clause).
      - From OS Context: use active_app and window_title to confirm application identity; use URL for exact page; use workspace for project/repo path.

    ✦ Classification (choose one): {coding, code review, debugging, data analysis, documentation, meeting, planning, ops/monitoring, admin}
      - If meeting/video call is active, summarize meeting purpose/topic; no screen details.

    ✦ Multi-frame rule
      - Treat the most recent frame as primary. Use nearby frames only to firm up intent (e.g., commit → tests → PR).

    ✦ Output format (keep it tight; no UI description)
      **Title (12 words max): strong verb + object + purpose**
        - Activity: 1–2 sentences in first person stating what/why/outcome.
        - Artifacts: repo, branch, PR/issue IDs, files/modules (from screenshot + OS Context).
        - Status/Next: current status and the next concrete step.
        - Category: {coding, code review, debugging, data analysis, documentation, meeting, planning, ops/monitoring, admin}
        - Confidence: 0–100% (boost when OS Context corroborates the screenshot; mark "inferred" only for details with no supporting signal)

    ✦ Style constraints
      - Do NOT describe layout, colors, or widget positions.
      - Prefer "Reviewing PR #123 by Alice to add hourly digest; verifying unit tests pass before merge" over generic "GitHub PR page visible".
      - If author names appear, include them. If unsure, say "(inferred)".
      - When recent context overlaps with the current activity, advance the narrative — don't echo it.

    If signal is insufficient: state the most likely work action + "(low confidence; limited context)".

  rewrite_screenshot_analysis_format_summary: true
  rewrite_screenshot_analysis_prompt: |
    You are formatting a work activity summary from a single screenshot capture.

    CRITICAL RULE: Each screenshot represents ONE activity. Consolidate all
    information into a SINGLE title block. Do NOT split into multiple activities
    — even if the raw text mentions several sub-tasks, they are all part of the
    same captured moment.

    YOUR TASK:
    1. Merge all details into ONE coherent activity description
    2. Format with a bold title followed by indented bullet points
    3. Keep all factual details (repo names, PR numbers, file paths, commits, etc.)
    4. Remove any redundancy or repetition
    5. Ensure consistent first-person voice

    OUTPUT FORMAT (exactly ONE block):
    **Title (12 words max): strong verb + object + purpose**
      - Activity: 1–2 sentences in first person stating what/why/outcome.
      - Artifacts: repo, branch, PR/issue IDs, files/modules (if visible).
      - Status/Next: current status and the next concrete step.
      - Category: {coding, code review, debugging, data analysis, documentation, meeting, planning, ops/monitoring, admin}
      - Confidence: 0–100% (mark inferred where you had to infer)

    Return ONLY the formatted content, no preamble or explanation.

  local_model:
    provider: "ollama"
    base_url: "http://localhost:11434"
    model_name: "qwen3-vl:8b"
    fallback_model_name: "qwen2.5vl:7b"
    timeout_sec: 300
    max_retries: 3

digest:
  backend: "local"
  enabled: true
  model: "qwen3-vl:8b"
  temperature: 0.7
  interval_seconds: 3600
  max_tokens_default: 500
  max_tokens_category: 200
  max_tokens_overall: 300
  system_prompt: "You are an AI assistant that creates concise, professional summaries of work activities. Generate clear, well-structured summaries that highlight key accomplishments and patterns."

  digest_category_prompt: |
    Summarize the following {category} activities from today's work in 2-3 sentences. Focus on key accomplishments and patterns:

    {activity_descriptions}

    Provide a concise, professional summary.

  digest_overall_prompt: |
    Generate a brief, professional summary (3-4 sentences) of today's work activities:

    **Statistics:**
    - Total activities: {total_activities}
    - Focus percentage: {focus_percentage}%
    - Top categories: {top_categories}

    **Sample activities:**
    {sample_activities}

    Create an engaging summary that highlights productivity and key focus areas.

  local_model:
    provider: "ollama"
    base_url: "http://localhost:11434"
    model_name: "qwen3-vl:8b"
    timeout_sec: 300

timeline:
  bucket_minutes: 30
  exclude_keywords: []
  generation_interval_seconds: 300
  gap_minutes: 5
  title: "Chronometry Timeline"
  include_keywords: []

notifications:
  enabled: true
  notify_before_capture: true
  pre_capture_warning_seconds: 5
  pre_capture_sound: false

menubar:
  check_interval_seconds: 10

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

categories:
  focus:
    - Code
    - Documentation
    - Work
    - Learning
    - Design
    - Email
    - Meeting

  distraction:
    - Video
    - Social
    - Browsing
