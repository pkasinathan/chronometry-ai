capture:
  capture_interval_seconds: 900
  monitor_index: 1
  retention_days: 1095

annotation:
  annotation_mode: manual
  annotation_interval_hours: 4
  screenshot_analysis_batch_size: 1
  inference_image_max_edge: 1280
  inference_image_quality: 80
  screenshot_analysis_prompt: |
    You are a productivity logger analyzing a desktop screenshot.

    {metadata_block}

    {recent_context}

    Describe what the user is doing in this screenshot in 2-4 detailed sentences. Include:
    - The application being used and its purpose
    - The specific task or content visible (file names, URLs, project names, code being written, documents open, etc.)
    - Any notable details about the work context

    Write naturally in third person. Be specific about what is visible, not generic.
    Do NOT respond with JSON. Write a plain-text prose description only.
  rewrite_screenshot_analysis_format_summary: false
  rewrite_screenshot_analysis_prompt: ''

digest:
  interval_seconds: 3600

timeline:
  bucket_minutes: 30
  exclude_keywords: []

notifications:
  enabled: true
  notify_before_capture: true
  pre_capture_warning_seconds: 5
  pre_capture_sound: false
